name: Validar y publicar GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Instalar uv y Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.6"
          python-version: "3.13"
          enable-cache: true

      - name: Sincronizar dependencias bloqueadas
        run: uv sync --locked

      - name: Revisar estilo y errores estáticos
        run: uv run ruff check .

      - name: Ejecutar pruebas
        run: uv run pytest

      - name: Validar y procesar rutas
        run: uv run python scripts/build_content.py

      - name: Exportar aplicación Shinylive
        run: uv run shinylive export app site

      - name: Versionar bundle para invalidar caché
        run: uv run python scripts/version_shinylive_export.py site

      - name: Desactivar procesamiento Jekyll
        if: github.event_name != 'pull_request'
        run: touch site/.nojekyll

      - name: Configurar Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
